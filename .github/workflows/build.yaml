name: Build

on:
  push:
    tags:
      - "v*"
    branches:
      - "*"
  pull_request:
    branches:
      - "*"
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest
    env:
      GO111MODULE: "on"
    steps:
      - name: Checkout code
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Set up Go
        uses: actions/setup-go@v5
        with:
          go-version: '1.24.4'
          cache: true

      - name: Prepare environment
        run: |-
          RELEASE_VERSION="${GITHUB_REF##*/}"
          if [[ "${RELEASE_VERSION}" != v* ]]; then RELEASE_VERSION='dev'; fi
          echo "RELEASE_VERSION=\"${RELEASE_VERSION}@${GITHUB_SHA:0:10}\"" | tee -a $GITHUB_ENV
          go mod vendor

      - name: Install UPX
        run: |-
          UPX_VERSION=4.2.4
          curl -fsSL -o upx.tar.xz "https://github.com/upx/upx/releases/download/v${UPX_VERSION}/upx-${UPX_VERSION}-amd64_linux.tar.xz"
          tar -xf upx.tar.xz
          sudo cp upx-${UPX_VERSION}-amd64_linux/upx /usr/local/bin/upx
          rm -rf upx-${UPX_VERSION}-amd64_linux upx.tar.xz
          upx --version

      - name: Unit Testing
        run: go test -v -race -bench=. ./...

      - name: Build Windows (386)
        run: GOOS=windows GOARCH=386 VERSION=${RELEASE_VERSION} make release

      - name: Build Windows (amd64)
        run: GOOS=windows GOARCH=amd64 VERSION=${RELEASE_VERSION} make release

      - name: Build Windows (amd64 v3)
        run: GOOS=windows GOARCH=amd64 GOAMD64=v3 VERSION=${RELEASE_VERSION} make release

      - name: Build Windows (arm64)
        run: GOOS=windows GOARCH=arm64 VERSION=${RELEASE_VERSION} make release

      - name: Build MacOS (amd64)
        run: GOOS=darwin GOARCH=amd64 VERSION=${RELEASE_VERSION} make release

      - name: Build MacOS (arm64)
        run: GOOS=darwin GOARCH=arm64 VERSION=${RELEASE_VERSION} make release

      - name: Build Linux (386) with UPX
        run: GOOS=linux GOARCH=386 VERSION=${RELEASE_VERSION} ENABLE_UPX=true make release

      - name: Build Linux (amd64) with UPX
        run: GOOS=linux GOARCH=amd64 VERSION=${RELEASE_VERSION} ENABLE_UPX=true make release

      - name: Build Linux (amd64 v3) with UPX
        run: GOOS=linux GOARCH=amd64 GOAMD64=v3 VERSION=${RELEASE_VERSION} ENABLE_UPX=true make release

      - name: Build Linux (arm v5) with UPX
        run: GOOS=linux GOARCH=arm GOARM=5 VERSION=${RELEASE_VERSION} ENABLE_UPX=true make release

      - name: Build Linux (arm v6) with UPX
        run: GOOS=linux GOARCH=arm GOARM=6 VERSION=${RELEASE_VERSION} ENABLE_UPX=true make release

      - name: Build Linux (arm64) with UPX
        run: GOOS=linux GOARCH=arm64 VERSION=${RELEASE_VERSION} ENABLE_UPX=true make release

      - name: Build Linux (mips) with UPX
        run: GOOS=linux GOARCH=mips GOMIPS=softfloat VERSION=${RELEASE_VERSION} ENABLE_UPX=true make release

      - name: Build Linux (mipsle) with UPX
        run: GOOS=linux GOARCH=mipsle GOMIPS=softfloat VERSION=${RELEASE_VERSION} ENABLE_UPX=true make release

      - name: Build FreeBSD (386) with UPX
        run: GOOS=freebsd GOARCH=386 VERSION=${RELEASE_VERSION} ENABLE_UPX=true make release

      - name: Build FreeBSD (amd64) with UPX
        run: GOOS=freebsd GOARCH=amd64 VERSION=${RELEASE_VERSION} ENABLE_UPX=true make release

      - name: Build FreeBSD (arm v6) with UPX
        run: GOOS=freebsd GOARCH=arm GOARM=6 VERSION=${RELEASE_VERSION} ENABLE_UPX=true make release

      - name: Build FreeBSD (arm64) with UPX
        run: GOOS=freebsd GOARCH=arm64 VERSION=${RELEASE_VERSION} ENABLE_UPX=true make release

      - name: List build artifacts
        run: ls -lh build/aliddns-*

      - name: Read Release Notes
        if: startsWith(github.ref, 'refs/tags/v')
        id: release_notes
        run: |
          if [ -f RELEASE_NOTES.md ]; then
            echo "body<<EOF" >> $GITHUB_OUTPUT
            cat RELEASE_NOTES.md >> $GITHUB_OUTPUT
            echo "EOF" >> $GITHUB_OUTPUT
          else
            echo "body=Release ${{ github.ref_name }}" >> $GITHUB_OUTPUT
          fi

      - name: Create Release and Upload Assets
        if: startsWith(github.ref, 'refs/tags/v')
        uses: softprops/action-gh-release@v1
        with:
          body: ${{ steps.release_notes.outputs.body }}
          draft: false
          prerelease: false
          files: |
            build/aliddns-*.tar.gz
            build/aliddns-*.zip
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
